<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" font-family="'Georgia', serif">
  <defs>
    <linearGradient id="parchment" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFF0"/>
      <stop offset="100%" stop-color="#F5F0E1"/>
    </linearGradient>
    <linearGradient id="gold-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B0000"/>
      <stop offset="50%" stop-color="#DAA520"/>
      <stop offset="100%" stop-color="#8B0000"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <style>
      @keyframes pulse { 0%,100%{opacity:0.6} 50%{opacity:1} }
      @keyframes glow-text { 0%,100%{fill:#DAA520} 50%{fill:#FFD700} }
      @keyframes fade-in { from{opacity:0} to{opacity:1} }
      @keyframes slide-up { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
      @keyframes seal-rotate { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
      .omega { animation: glow-text 3s ease-in-out infinite; font-weight: bold; }
      .pulse { animation: pulse 2s ease-in-out infinite; }
      .fade1 { animation: fade-in 1s ease-out 0.2s both; }
      .fade2 { animation: fade-in 1s ease-out 0.5s both; }
      .fade3 { animation: fade-in 1s ease-out 0.8s both; }
      .fade4 { animation: fade-in 1s ease-out 1.1s both; }
      .fade5 { animation: fade-in 1s ease-out 1.4s both; }
      .slide1 { animation: slide-up 0.8s ease-out 0.3s both; }
      .slide2 { animation: slide-up 0.8s ease-out 0.6s both; }
      .slide3 { animation: slide-up 0.8s ease-out 0.9s both; }
      .seal-spin { animation: seal-rotate 20s linear infinite; transform-origin: 400px 80px; }
      .highlight { fill: #DAA520; opacity: 0.3; }
      .evidence { font-family: 'Helvetica', sans-serif; font-size: 8px; font-weight: bold; fill: white; }
      .chapter-num { font-family: 'Courier New', monospace; fill: #DAA520; }
      .body { font-size: 14px; line-height: 1.8; fill: #333; }
      .seal-text { font-family: 'Courier New', monospace; font-size: 9px; fill: #8B0000; letter-spacing: 2px; }
      .agent-label { font-family: 'Helvetica', sans-serif; font-size: 10px; fill: #DAA520; font-weight: bold; letter-spacing: 1px; }
      .nav-btn { cursor: pointer; transition: opacity 0.2s; }
      .nav-btn:hover { opacity: 0.8; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="1000" fill="#0A0A0A"/>

  <!-- Header Bar -->
  <rect width="800" height="48" fill="#111"/>
  <rect y="48" width="800" height="1" fill="#8B0000"/>
  <text x="24" y="30" font-family="'Helvetica', sans-serif" font-size="16" font-weight="bold" fill="#DC143C" letter-spacing="2">SNAPKITTY REDBOOK</text>
  <text x="776" y="30" font-family="'Courier New', monospace" font-size="10" fill="#DAA520" text-anchor="end">Ω READ MODE</text>

  <!-- Book Pages -->
  <g filter="url(#shadow)">
    <!-- Left Page -->
    <rect x="40" y="80" width="350" height="520" rx="4" fill="url(#parchment)"/>
    <text x="60" y="110" class="chapter-num" font-size="11">CHAPTER 01</text>
    <text x="60" y="130" font-size="18" font-weight="bold" fill="#8B0000">The Covenant Opens</text>
    <line x1="60" y1="140" x2="200" y2="140" stroke="url(#gold-line)" stroke-width="1"/>

    <text x="60" y="170" class="body fade1">
      <tspan x="60" dy="0">Evidence begins where</tspan>
      <tspan x="60" dy="22" font-weight="bold" fill="#8B0000">silence</tspan>
      <tspan> ends.</tspan>
    </text>

    <text x="60" y="220" class="body fade2">
      <tspan x="60" dy="0">In the beginning there was</tspan>
      <tspan font-weight="bold" fill="#B8860B"> provenance</tspan>
      <tspan>, and provenance</tspan>
      <tspan x="60" dy="22">demanded a source. Every claim</tspan>
      <tspan x="60" dy="22">needed a timestamp, a hash, and</tspan>
      <tspan x="60" dy="22">a witness.</tspan>
    </text>

    <text x="60" y="310" class="body fade3">
      <tspan x="60" dy="0">This is the first doctrine of</tspan>
      <tspan x="60" dy="22">the SnapKitty Redbook:</tspan>
    </text>

    <!-- Omega symbol -->
    <text x="180" y="365" class="omega" font-size="28" text-anchor="middle" filter="url(#glow)">Ω</text>

    <text x="60" y="400" class="body slide1">
      <tspan x="60" dy="0">nothing is true because</tspan>
      <tspan x="60" dy="22">someone said so — it is true</tspan>
      <tspan x="60" dy="22">because it was sealed.</tspan>
    </text>

    <!-- Seal line -->
    <line x1="60" y1="470" x2="370" y2="470" stroke="#ddd" stroke-width="0.5"/>
    <text x="60" y="488" class="seal-text">SNAPKITTYWEST-GAPFILL-001</text>

    <text x="60" y="510" class="body fade4" font-size="12" fill="#666">
      <tspan x="60" dy="0">The 1928 Moorish Divine Covenant</tspan>
      <tspan x="60" dy="18">established that rights are not</tspan>
      <tspan x="60" dy="18">granted by institutions. They are</tspan>
      <tspan x="60" dy="18" font-weight="bold" fill="#333">inherent</tspan>
      <tspan>.</tspan>
    </text>

    <text x="60" y="585" font-family="'Courier New', monospace" font-size="9" fill="#999">1</text>
  </g>

  <g filter="url(#shadow)">
    <!-- Right Page -->
    <rect x="410" y="80" width="350" height="520" rx="4" fill="url(#parchment)"/>

    <text x="430" y="115" class="body fade2" font-size="12">
      <tspan x="430" dy="0">The covenant_seal function</tspan>
      <tspan x="430" dy="20">creates a WORM (Write Once Read</tspan>
      <tspan x="430" dy="20">Many) artifact — an immutable</tspan>
      <tspan x="430" dy="20">record that cannot be altered</tspan>
      <tspan x="430" dy="20">after creation.</tspan>
    </text>

    <!-- Evidence Badge -->
    <rect x="430" y="230" width="62" height="16" rx="3" fill="#1a5276"/>
    <text x="436" y="241" class="evidence">EVIDENCE</text>

    <text x="430" y="265" class="body slide2" font-size="12">
      <tspan x="430" dy="0">Each seal contains a SHA-256</tspan>
      <tspan x="430" dy="20">hash of the payload, a timestamp,</tspan>
      <tspan x="430" dy="20">and an HMAC-SHA256 signature.</tspan>
    </text>

    <!-- Seal Diagram -->
    <g transform="translate(530, 340)" class="seal-spin" opacity="0.2">
      <circle cx="0" cy="0" r="50" fill="none" stroke="#8B0000" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="45" fill="none" stroke="#DAA520" stroke-width="0.5"/>
      <text x="0" y="5" text-anchor="middle" font-size="24" fill="#8B0000" font-weight="bold">Ω</text>
    </g>

    <!-- Goldilocks Field -->
    <rect x="430" y="320" width="310" height="80" rx="4" fill="#F5F0E1" stroke="#DAA520" stroke-width="0.5"/>
    <text x="440" y="340" class="agent-label">GOLDILOCKS PRIME</text>
    <text x="440" y="360" font-family="'Courier New', monospace" font-size="12" fill="#333">p = 2⁶⁴ − 2³² + 1</text>
    <text x="440" y="380" font-family="'Courier New', monospace" font-size="10" fill="#666">18,446,744,069,414,584,321</text>

    <text x="430" y="430" class="body fade3" font-size="12">
      <tspan x="430" dy="0">It is the largest prime that fits</tspan>
      <tspan x="430" dy="20">in a 64-bit word, enabling</tspan>
      <tspan x="430" dy="20">modular arithmetic at</tspan>
      <tspan x="430" dy="20" font-weight="bold" fill="#8B0000">hardware speed</tspan>
      <tspan>.</tspan>
    </text>

    <text x="740" y="585" font-family="'Courier New', monospace" font-size="9" fill="#999" text-anchor="end">2</text>
  </g>

  <!-- Bottom Controls -->
  <rect y="620" width="800" height="80" fill="#0D0D0D"/>
  <line y1="620" x2="800" stroke="#8B0000" stroke-width="1"/>

  <!-- Agent Avatar -->
  <circle cx="70" cy="660" r="18" fill="#8B0000" stroke="#DAA520" stroke-width="1.5"/>
  <text x="70" y="665" text-anchor="middle" font-size="14">🤖</text>

  <text x="96" y="652" class="agent-label">BOB</text>
  <text x="96" y="668" font-family="'Helvetica', sans-serif" font-size="10" fill="#666">Reading: The Covenant Opens</text>

  <!-- Controls -->
  <g class="nav-btn">
    <circle cx="460" cy="660" r="16" fill="none" stroke="#333" stroke-width="1"/>
    <text x="460" y="664" text-anchor="middle" font-size="12" fill="#E0E0E0">⏮</text>
  </g>
  <g class="nav-btn">
    <circle cx="500" cy="660" r="20" fill="#DC143C"/>
    <text x="500" y="665" text-anchor="middle" font-size="14" fill="white">▶</text>
  </g>
  <g class="nav-btn">
    <circle cx="540" cy="660" r="16" fill="none" stroke="#333" stroke-width="1"/>
    <text x="540" y="664" text-anchor="middle" font-size="12" fill="#E0E0E0">⏭</text>
  </g>

  <!-- Progress Bar -->
  <rect x="580" y="658" width="180" height="4" rx="2" fill="#222"/>
  <rect x="580" y="658" width="72" height="4" rx="2" fill="url(#gold-line)"/>
  <text x="776" y="664" font-family="'Courier New', monospace" font-size="9" fill="#666" text-anchor="end">1 / 2</text>

  <!-- Commentary -->
  <rect x="200" y="720" width="500" height="60" rx="8" fill="rgba(10,10,10,0.95)" stroke="#DAA520" stroke-width="0.5"/>
  <text x="220" y="742" class="agent-label" font-size="9">BOB:</text>
  <text x="220" y="760" font-size="11" fill="#E0E0E0">
    <tspan x="220" dy="0">"This passage defines provenance. In system terms,</tspan>
    <tspan x="220" dy="16">provenance means every claim needs a source, timestamp, and hash."</tspan>
  </text>

  <!-- Footer -->
  <rect y="800" width="800" height="200" fill="#0A0A0A"/>

  <!-- Seal Stamp -->
  <g transform="translate(400, 880)" opacity="0.3">
    <rect x="-120" y="-45" width="240" height="90" rx="4" fill="none" stroke="#8B0000" stroke-width="1.5"/>
    <text x="0" y="-25" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#8B0000" letter-spacing="2">SNAPKITTY REDBOOK</text>
    <text x="0" y="-10" text-anchor="middle" font-family="'Courier New', monospace" font-size="7" fill="#DAA520" letter-spacing="1">INTERACTIVE TRUST BOOK</text>
    <line x1="-100" y1="-3" x2="100" y2="-3" stroke="#8B0000" stroke-width="0.5"/>
    <text x="0" y="12" text-anchor="middle" font-family="'Courier New', monospace" font-size="7" fill="#666">MODE: READ ALOUD</text>
    <text x="0" y="24" text-anchor="middle" font-family="'Courier New', monospace" font-size="7" fill="#666">AGENT: BOB</text>
    <text x="0" y="36" text-anchor="middle" font-family="'Courier New', monospace" font-size="7" fill="#666">STATUS: WORM-SEALED</text>
    <text x="0" y="48" text-anchor="middle" font-family="'Courier New', monospace" font-size="7" fill="#8B0000">SEAL: Ω EVIDENCE OR SILENCE</text>
  </g>

  <!-- Links -->
  <text x="400" y="960" text-anchor="middle" font-family="'Helvetica', sans-serif" font-size="10" fill="#666">
    <tspan>github.com/SNAPKITTYWEST</tspan>
  </text>
  <text x="400" y="978" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#444">
    <tspan>DOI: 10.5281/zenodo.21132094</tspan>
  </text>
</svg>
